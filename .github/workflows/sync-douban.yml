name: Sync Douban Movies

on:
  # 手动触发
  workflow_dispatch:

  # 定时执行：每周一凌晨 2:00 UTC（北京时间周一 10:00）
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

env:
  # 默认豆瓣用户 ID（也可通过仓库 Variables 覆盖）
  DEFAULT_DOUBAN_ID: '111296951'

jobs:
  sync:
    name: Sync Douban Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 豆瓣用户 ID 已配置在上方 env.DEFAULT_DOUBAN_ID
      # 也可通过仓库 Settings → Variables → DOUBAN_USER_ID 覆盖

      - name: Resolve Douban User ID
        id: douban-id
        run: |
          # 优先使用仓库变量，否则用默认值
          DOUBAN_ID="${{ vars.DOUBAN_USER_ID || env.DEFAULT_DOUBAN_ID }}"
          if [ -z "$DOUBAN_ID" ]; then
            echo "⚠️  未配置豆瓣用户 ID，跳过同步"
            exit 1
          fi
          echo "id=$DOUBAN_ID" >> $GITHUB_OUTPUT
          echo "✓ 使用豆瓣用户 ID: $DOUBAN_ID"

      - name: Sync Douban watched movies
        uses: lizheming/doumark-action@master
        with:
          id: ${{ steps.douban-id.outputs.id }}
          type: movie
          status: done
          format: json
          dir: ./data/raw/douban
          # cookie 可选，用于访问私密内容
          # cookie: ${{ secrets.DOUBAN_COOKIE }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Normalize data
        run: npm run data:normalize

      - name: Validate data
        run: npm run data:validate

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 数据无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📬 数据有变化，准备提交"
            git diff --stat data/
          fi

      - name: Commit updated data
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(data): sync Douban movies

          Auto-synced by doumark-action
          Run ID: ${{ github.run_id }}"
          git push
