name: Sync Douban Movies

on:
  # 手动触发
  workflow_dispatch:

  # 定时执行：每周一凌晨 2:00 UTC（北京时间周一 10:00）
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  sync:
    name: Sync Douban Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 豆瓣用户 ID 配置说明 ─────────────────────────────────
      # 请在仓库 Settings → Variables → Actions Variables 中添加：
      #   Name: DOUBAN_USER_ID
      #   Value: 你的豆瓣用户 ID（数字，可从豆瓣个人主页 URL 获取）
      #
      # 示例豆瓣主页 URL: https://www.douban.com/people/123456789/
      # 则 DOUBAN_USER_ID 填写: 123456789
      # ─────────────────────────────────────────────────────────

      - name: Validate Douban User ID
        run: |
          if [ -z "${{ vars.DOUBAN_USER_ID }}" ]; then
            echo "⚠️  未配置 DOUBAN_USER_ID，跳过豆瓣同步"
            echo "请在仓库 Settings → Variables → Actions Variables 中添加 DOUBAN_USER_ID"
            exit 0
          fi
          echo "✓ 使用豆瓣用户 ID: ${{ vars.DOUBAN_USER_ID }}"

      - name: Sync Douban watched movies
        if: vars.DOUBAN_USER_ID != ''
        uses: lizheming/doumark-action@master
        with:
          id: ${{ vars.DOUBAN_USER_ID }}
          type: movie
          status: done
          format: json
          dir: ./data/raw/douban
          # cookie 可选，用于访问私密内容
          # cookie: ${{ secrets.DOUBAN_COOKIE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Normalize data
        run: npm run data:normalize

      - name: Validate data
        run: npm run data:validate

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 数据无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📬 数据有变化，准备提交"
            git diff --stat data/
          fi

      - name: Commit updated data
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(data): sync Douban movies

          Auto-synced by doumark-action
          Run ID: ${{ github.run_id }}"
          git push
