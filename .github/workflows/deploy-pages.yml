name: Deploy to GitHub Pages

on:
  # main 分支推送时自动构建
  push:
    branches:
      - main

  # 手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过队列中的运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Generate and validate data
        run: |
          echo "📥 标准化数据..."
          npm run data:normalize
          echo "🔍 校验数据..."
          npm run data:validate

      - name: Build with Astro
        run: |
          echo "🔨 构建网站..."
          npm run build -- --site "${{ steps.pages.outputs.origin }}" --base "/film_wall"
        env:
          # 注意：Astro 会自动读取 astro.config.mjs 中的 base
          # 此处 --base 参数用于覆盖（如有需要）
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
